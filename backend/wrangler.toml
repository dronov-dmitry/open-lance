# Cloudflare Workers Configuration for Open-Lance
# MongoDB Atlas + Cloudflare Workers

name = "open-lance-backend"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Enable workers.dev subdomain (automatic subdomain: open-lance-backend.workers.dev)
workers_dev = true

# Enable Node.js compatibility for crypto, buffer, util, stream modules
compatibility_flags = ["nodejs_compat"]

# Environment variables (set using wrangler secret put)
# These are placeholders - actual values should be set via CLI:
# echo "your-mongodb-uri" | wrangler secret put MONGODB_URI
# echo "your-jwt-secret" | wrangler secret put JWT_SECRET

# For local development
[dev]
port = 8787
local_protocol = "http"
