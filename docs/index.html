<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Open-Lance - P2P Freelance Marketplace">
    <title>Open-Lance - Freelance Marketplace</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>Open-Lance</h1>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="#" data-page="home">Главная</a>
                <a href="#" data-page="tasks">Задачи</a>
                <a href="#" data-page="my-tasks">Мои задачи</a>
                <a href="#" data-page="profile">Профиль</a>
                <button id="authBtn" class="btn btn-primary">Войти</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="app" class="container">
        <!-- Content will be dynamically loaded here -->
    </main>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Вход в систему</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Войти</button>
                <p class="form-footer">
                    Нет аккаунта? <a href="#" id="showRegister">Зарегистрироваться</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Регистрация</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Пароль</label>
                    <input type="password" id="regPassword" required>
                </div>
                <div class="form-group">
                    <label for="regPasswordConfirm">Подтвердите пароль</label>
                    <input type="password" id="regPasswordConfirm" required>
                </div>
                <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                <p class="form-footer">
                    Уже есть аккаунт? <a href="#" id="showLogin">Войти</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer"></div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/components/tasks.js"></script>
    <script src="js/components/profile.js"></script>
    <script src="js/components/home.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
